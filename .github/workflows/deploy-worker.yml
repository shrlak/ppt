name: Deploy AI Proxy Worker

on:
  push:
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    # Deploy only on pushes (or manual runs) targeting whatever the default branch currently is —
    # never from a pull_request event, so a fork can't trigger a deploy using these secrets.
    if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Cloudflare rejects `secret bulk` when the latest Worker version has
      # never been deployed (API error 10215). Bootstrap the current script
      # first; the next step can then update its secrets safely.
      - name: Deploy Worker code
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: '4.110.0'
          command: deploy

      - name: Sync secrets and redeploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # Pin explicitly: without this the action falls back to installing
          # its own (older) default wrangler version instead of the one in
          # worker/package.json, and that stale version's `secret bulk`
          # command fails to upload secrets.
          wranglerVersion: '4.110.0'
          command: deploy
          # Pushes each listed env var (below) into the Worker as a secret
          # via `wrangler secret put` before deploying. Only keys with a
          # non-empty repo secret get set — leave one blank to skip it.
          secrets: |
            GEMINI_API_KEY
            NVIDIA_API_KEY
            HUGGINGFACE_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
