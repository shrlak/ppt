name: Deploy AI Proxy Worker

on:
  push:
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    # Deploy only on pushes (or manual runs) targeting whatever the default branch currently is —
    # never from a pull_request event, so a fork can't trigger a deploy using these secrets.
    if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Cloudflare rejects `secret bulk` when the latest Worker version has
      # never been deployed (API error 10215). Bootstrap the current script
      # first; the next step can then update its secrets safely.
      - name: Deploy Worker code
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: '4.110.0'
          command: deploy

      # wrangler-action fails outright when a listed secret has no value
      # ("Value for secret X not found in environment"), so build the list
      # from the repo secrets that are actually set — an unset provider key
      # must skip that provider, not break the whole deploy.
      - name: List provider API keys that have repo secrets
        id: provider-keys
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          {
            echo 'list<<LIST'
            for name in GEMINI_API_KEY HUGGINGFACE_API_KEY OPENROUTER_API_KEY; do
              if [ -n "${!name}" ]; then
                echo "$name"
              else
                echo "skipping $name — no repo secret set" >&2
              fi
            done
            echo 'LIST'
          } >> "$GITHUB_OUTPUT"

      - name: Sync secrets and redeploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # Pin explicitly: without this the action falls back to installing
          # its own (older) default wrangler version instead of the one in
          # worker/package.json, and that stale version's `secret bulk`
          # command fails to upload secrets.
          wranglerVersion: '4.110.0'
          command: deploy
          # Pushes each listed env var into the Worker as a secret before
          # deploying. The list comes from the step above, so only keys with
          # a non-empty repo secret are attempted.
          secrets: ${{ steps.provider-keys.outputs.list }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
