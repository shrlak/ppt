name = "lyrics-ai-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Comma-separated list of origins allowed to call this proxy. Must match the
# deployed site exactly (scheme + host, no trailing slash) — the GitHub Pages
# URL derived from vite.config.ts's base path ("/ppt/").
# Add a second origin (comma-separated) for local dev, e.g. "http://localhost:4173".
[vars]
ALLOWED_ORIGINS = "https://shrlak.github.io"
# Dashboard reference limits. Gemini quotas vary per project; update this to
# the RPD value shown in AI Studio. Hugging Face currently grants free users
# $0.10/month, while hf-inference cost is estimated from compute time.
GEMINI_MODEL = "gemini-2.5-flash"
GEMINI_DAILY_REQUEST_LIMIT = "250"
# OpenRouter's free-model allowance is shared across all :free models. Keep
# this at 50 for accounts that have not purchased credits; set it to 1000
# after the account has purchased at least $10 in credits.
OPENROUTER_MODEL = "nvidia/nemotron-nano-12b-v2-vl:free"
OPENROUTER_DAILY_REQUEST_LIMIT = "50"
HUGGINGFACE_MONTHLY_CREDIT_USD = "0.10"
HUGGINGFACE_USD_PER_SECOND = "0.00012"

[[durable_objects.bindings]]
name = "USAGE_TRACKER"
class_name = "UsageTracker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UsageTracker"]

# API keys are NOT set here (this file is committed to git). Set them with:
#   npx wrangler secret put GEMINI_API_KEY
#   npx wrangler secret put HUGGINGFACE_API_KEY
#   npx wrangler secret put OPENROUTER_API_KEY
# POST /settings (shared recognition settings) is guarded by the 관리자 설정
# password. It defaults to the app's built-in admin password; override with:
#   npx wrangler secret put ADMIN_PASSWORD
